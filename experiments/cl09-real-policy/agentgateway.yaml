# yaml-language-server: $schema=https://agentgateway.dev/schema/config
# extAuthz -> OPA-Envoy (:9191); on allow forward to the HTTP backend. (Standalone
# extAuthz flattens the backend: `host:` directly, not `target:`.)
binds:
- port: 3000
  listeners:
  - routes:
    - policies:
        extAuthz:
          host: opa:9191
          failureMode: deny
          includeRequestBody:
            maxRequestBytes: 8192
            allowPartialMessage: true
      backends:
      - host: backend:5678
